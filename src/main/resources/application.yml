server:
  port: ${PORT:8088}

spring:
  datasource:
    url: ${SHAREBILL_DB_URL:jdbc:postgresql://localhost:5433/sharebill}
    username: ${SHAREBILL_DB_USER:sharebill}
    password: ${SHAREBILL_DB_PASSWORD:sharebill}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration

sharebill:
  jwt:
    secret: ${SHAREBILL_JWT_SECRET:dev-only-secret-change-me-0123456789abcdef0123456789abcdef}
    ttl-seconds: 604800
  cors:
    allowed-origins: ${SHAREBILL_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
